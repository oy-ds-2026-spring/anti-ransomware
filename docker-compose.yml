version: '3.8'

services:
  # rabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "15672:15672"  # web management UI (http://localhost:15672)
      - "5672:5672"    # application connection port
    volumes: # disable logging
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - ransom_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper (for Kafka)
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.4.0
  #   container_name: zookeeper
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #     ZOOKEEPER_TICK_TIME: 2000
  #   networks:
  #     - ransom_net

  # Kafka
  # kafka:
  #   image: confluentinc/cp-kafka:7.4.0
  #   container_name: kafka
  #   depends_on:
  #     - zookeeper
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #   networks:
  #     - ransom_net

  # Kerberos KDC Server
  kdc-server:
    build: ./kerberos
    container_name: kdc-server
    hostname: kdc-server
    volumes:
      - keytabs:/keytabs
    networks:
      - ransom_net
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/localhost/88"]
      interval: 5s
      timeout: 5s
      retries: 10

  # detection service
  detection-service:
    build: .
    container_name: detection-service
    command: python -m detection.detection
    ports:
      - "4020:4020"
    volumes:
      - .:/app  # mount current source code; changes take effect after restart
      - ./shared_logs:/logs
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ransom_net

#  # recovery Service
#  recovery-service:
#    build: .
#    container_name: recovery-service
#    command: python ./recovery/recovery.py
#    volumes:
#      - .:/app
#      - ./recovery/recovery_logs:/logs # file writing log, for further recovery
#    depends_on:
#      - backup-storage
#    networks:
#      - ransom_net

  # backup storage
  backup-storage:
    build: .
    container_name: backup-storage
    command: python -m recovery.backup_server
    expose:
      - "50052" # Expose the new gRPC port
    environment:
      - KRB5_CONFIG=/etc/krb5.conf
      - KRB5_KTNAME=/keytabs/backup-storage.keytab
    volumes:
      - ./recovery/backup:/data
      - ./kerberos/krb5.conf:/etc/krb5.conf:ro
      - keytabs:/keytabs:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      kdc-server:
        condition: service_healthy
    networks:
      - ransom_net

  # 4 replications of finance department
  # client: finance1
  client-finance1:
    build: .
    container_name: client-finance1
    hostname: client-finance1
    command: >
      sh -lc '
        set -e;
        echo "[client] checking restic repo...";
        restic snapshots >/dev/null 2>&1 || restic init;
        echo "[client] restic repo ok";
        exec python -m client.client_server
      '
    expose:
      - "50051"  # gRPC Lockdown port
      - "4321"
    ports:
      - "5001:5000" # file browser & swagger
    environment:
      - CLIENT_ID=finance1
      - MONITOR_DIR=/data
      - PEERS=client-finance2:4321,client-finance3:4321,client-finance4:4321
      - RESTIC_REPOSITORY=rest:http://finance:12345678@rest-server:8000/finance/finance
      - RESTIC_PASSWORD_FILE=/run/secrets/restic_repo_pass
      - KRB5_CONFIG=/etc/krb5.conf
      - KRB5_KTNAME=/keytabs/finance1.keytab
    volumes:
      - .:/app
      - ./secrets/restic_repo_pass_finance:/run/secrets/restic_repo_pass:ro
      - ./simulation_data/finance1:/data:delegated # Mount simulated data
      - ./shared_logs:/logs  
      - ./kerberos/krb5.conf:/etc/krb5.conf:ro
      - keytabs:/keytabs:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      rest-server:
        condition: service_healthy
      kdc-server:
        condition: service_healthy
    networks:
      - ransom_net

  # client: finance2
  client-finance2:
    build: .
    container_name: client-finance2
    hostname: client-finance2
    command: >
      sh -lc '
        set -e;
        echo "[client] checking restic repo...";
        restic snapshots >/dev/null 2>&1 || echo "[client] repo not ready yet";
        echo "[client] restic repo ok";
        exec python -m client.client_server
      '
    expose:
      - "50051"  # gRPC Lockdown port
      - "4321"
    environment:
      - CLIENT_ID=finance2
      - MONITOR_DIR=/data
      - PEERS=client-finance1:4321,client-finance3:4321,client-finance4:4321
      - RESTIC_REPOSITORY=rest:http://finance:12345678@rest-server:8000/finance/finance
      - RESTIC_PASSWORD_FILE=/run/secrets/restic_repo_pass
      - KRB5_CONFIG=/etc/krb5.conf
      - KRB5_KTNAME=/keytabs/finance2.keytab
    volumes:
      - .:/app
      - ./secrets/restic_repo_pass_finance:/run/secrets/restic_repo_pass:ro
      - ./simulation_data/finance2:/data:delegated # Mount simulated data
      - ./shared_logs:/logs  
      - ./kerberos/krb5.conf:/etc/krb5.conf:ro
      - keytabs:/keytabs:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      rest-server:
        condition: service_healthy
      kdc-server:
        condition: service_healthy
    networks:
      - ransom_net

  # client: finance3
  client-finance3:
    build: .
    container_name: client-finance3
    hostname: client-finance3
    command: >
      sh -lc '
        set -e;
        echo "[client] checking restic repo...";
        restic snapshots >/dev/null 2>&1 || echo "[client] repo not ready yet";
        echo "[client] restic repo ok";
        exec python -m client.client_server
      '
    expose:
      - "50051"  # gRPC Lockdown port
      - "4321"
    environment:
      - CLIENT_ID=finance3
      - MONITOR_DIR=/data
      - PEERS=client-finance1:4321,client-finance2:4321,client-finance4:4321
      - RESTIC_REPOSITORY=rest:http://finance:12345678@rest-server:8000/finance/finance
      - RESTIC_PASSWORD_FILE=/run/secrets/restic_repo_pass
      - KRB5_CONFIG=/etc/krb5.conf
      - KRB5_KTNAME=/keytabs/finance3.keytab
    volumes:
      - .:/app
      - ./secrets/restic_repo_pass_finance:/run/secrets/restic_repo_pass:ro
      - ./simulation_data/finance3:/data:delegated # Mount simulated data
      - ./shared_logs:/logs  
      - ./kerberos/krb5.conf:/etc/krb5.conf:ro
      - keytabs:/keytabs:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      rest-server:
        condition: service_healthy
      kdc-server:
        condition: service_healthy
    networks:
      - ransom_net

  # client: finance4
  client-finance4:
    build: .
    container_name: client-finance4
    hostname: client-finance4
    command: >
      sh -lc '
        set -e;
        echo "[client] checking restic repo...";
        restic snapshots >/dev/null 2>&1 || echo "[client] repo not ready yet";
        echo "[client] restic repo ok";
        exec python -m client.client_server
      '
    expose:
      - "50051"  # gRPC Lockdown port
      - "4321"
    environment:
      - CLIENT_ID=finance4
      - MONITOR_DIR=/data
      - PEERS=client-finance2:4321,client-finance3:4321,client-finance1:4321
      - RESTIC_REPOSITORY=rest:http://finance:12345678@rest-server:8000/finance/finance
      - RESTIC_PASSWORD_FILE=/run/secrets/restic_repo_pass
      - KRB5_CONFIG=/etc/krb5.conf
      - KRB5_KTNAME=/keytabs/finance4.keytab
    volumes:
      - .:/app
      - ./secrets/restic_repo_pass_finance:/run/secrets/restic_repo_pass:ro
      - ./simulation_data/finance4:/data:delegated # Mount simulated data
      - ./shared_logs:/logs  
      - ./kerberos/krb5.conf:/etc/krb5.conf:ro
      - keytabs:/keytabs:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      rest-server:
        condition: service_healthy
      kdc-server:
        condition: service_healthy
    networks:
      - ransom_net

  # attacker
  # attacker-node:
  #   build: .
  #   container_name: attacker-node
  #   command: python attacker.py
  #   ports:
  #     - "8080:8080"  # http://localhost:8080
  #   volumes:
  #     - .:/app
  #   networks:
  #     - ransom_net
  
  # dashboard
  dashboard-node:
    build: .
    container_name: dashboard-node
    working_dir: /app/dashboard
    command: python dashboard.py
    ports:
      - "8501:8501"  # frontend dashboard
    volumes:
      - .:/app
      - ./shared_logs:/logs  
    networks:
      - ransom_net

  # finance-gateway
  finance-gateway:
    build: .
    container_name: finance-gateway
    command: python -m gateway.gateway_server
    ports:
      - "9000:9000" # gateway swagger
    environment:
      - STORAGE_NODES=client-finance1,client-finance2,client-finance3,client-finance4
      - KRB5_CONFIG=/etc/krb5.conf
      - KRB5_KTNAME=/keytabs/gateway.keytab
    volumes:
      - .:/app
      - ./kerberos/krb5.conf:/etc/krb5.conf:ro
      - keytabs:/keytabs:ro
    depends_on:
      kdc-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      detection-service:
        condition: service_started
    networks:
      - ransom_net

  # restic repository HTTP backend
  rest-server:
    image: restic/rest-server:latest
    container_name: rest-server
    command:
      [
        "rest-server",
        "--path", "/data",
        "--listen", "0.0.0.0:8000",
        "--private-repos",
        "--htpasswd-file", "/run/secrets/htpasswd"
      ]
    volumes:
      - ./secure_backups/restic_repos:/data
      - ./secure_backups/restic_repos/.htpasswd:/run/secrets/htpasswd:ro
    networks:
      - ransom_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ >/dev/null 2>&1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ransom_net:
    name: ransom_net
    driver: bridge

# run-time shared folder
volumes:
  keytabs:
