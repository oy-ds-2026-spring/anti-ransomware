syntax = "proto3";

package common;

service LockdownService {
  // Detection calls this on Backup and Clients
  rpc TriggerLockdown (LockdownRequest) returns (LockdownResponse) {}
  rpc TriggerUnlock (UnlockRequest) returns (UnlockResponse);
}

message LockdownRequest {
  string threat_id = 1;
  string timestamp = 2;
  string reason = 3;
  string targeted_node = 4;
}

message LockdownResponse {
  bool success = 1;
  string status_message = 2;
}

message UnlockRequest {
    string threat_id = 1;
    string timestamp = 2;
    string reason = 3;
    string targeted_node = 4;
}

message UnlockResponse {
    bool success = 1;
    string status_message = 2;
}
